name: Build Backend (ASP.NET 4.5.2)

# Quando rodar:
# - Toda vez que houver push na branch main alterando algo em backend/
# - Manualmente, pelo botão "Run workflow" na aba Actions do GitHub
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

jobs:
  build:
    name: Compilar e empacotar API
    runs-on: windows-latest

    steps:
      - name: 1) Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 2) Preparar MSBuild (Visual Studio Build Tools)
        uses: microsoft/setup-msbuild@v2

      - name: 3) Preparar NuGet
        uses: NuGet/setup-nuget@v2

      - name: 4) Restaurar pacotes NuGet
        working-directory: backend/Maryar.Api
        run: nuget restore packages.config -PackagesDirectory ..\packages -SolutionDirectory ..

      - name: 5) Compilar em Release e publicar em pasta
        working-directory: backend/Maryar.Api
        run: >
          msbuild Maryar.Api.csproj
          /p:Configuration=Release
          /p:Platform=AnyCPU
          /p:DeployOnBuild=true
          /p:WebPublishMethod=FileSystem
          /p:DeployDefaultTarget=WebPublish
          /p:publishUrl=..\publish
          /p:DeleteExistingFiles=true
          /p:PrecompileBeforePublish=false
          /p:ExcludeApp_Data=true

      - name: 6) Compactar a pasta publish em maryar-api-deploy.zip
        run: |
          Compress-Archive -Path backend/publish/* -DestinationPath maryar-api-deploy.zip -Force
        shell: pwsh

      - name: 7) Publicar o ZIP como artifact (download na aba Actions)
        uses: actions/upload-artifact@v4
        with:
          name: maryar-api-deploy
          path: maryar-api-deploy.zip
          retention-days: 30
