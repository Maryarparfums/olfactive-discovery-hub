name: Build Backend (ASP.NET 4.5.2)
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:
jobs:
  build:
    name: Compilar e empacotar API
    runs-on: windows-latest
    steps:
      - name: 1) Baixar o código do repositório
        uses: actions/checkout@v4
      - name: 2) Preparar MSBuild (Visual Studio Build Tools)
        uses: microsoft/setup-msbuild@v2
      - name: 3) Instalar .NET Framework 4.5.2 Developer Pack
        shell: pwsh
        run: choco install netfx-4.5.2-devpack -y --no-progress
      - name: 4) Preparar NuGet
        uses: NuGet/setup-nuget@v2
      - name: 5) Localizar VisualStudio e Web targets
        id: vsenv
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsPath) { $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" }
          Write-Host "VS Path: $vsPath"
          $vsToolsPath = Join-Path $vsPath "MSBuild\Microsoft\VisualStudio\v17.0"
          $webAppTargets = Join-Path $vsToolsPath "WebApplications\Microsoft.WebApplication.targets"
          if (-not (Test-Path $webAppTargets)) {
            Write-Host "WebApplication.targets nao encontrado em $webAppTargets. Instalando workload Web via VS Installer..."
            $installer = Join-Path $vsPath "..\..\Installer\setup.exe"
            if (Test-Path $installer) {
              & $installer modify --installPath "$vsPath" --add Microsoft.VisualStudio.Component.WebDeploy --add Microsoft.VisualStudio.Component.Web --quiet --norestart --wait | Out-Null
            }
          }
          if (-not (Test-Path $webAppTargets)) {
            Write-Host "Tentando baixar MSBuild.Microsoft.VisualStudio.Web.targets via NuGet como fallback..."
            nuget install MSBuild.Microsoft.VisualStudio.Web.targets -Version 14.0.0.3 -OutputDirectory "$env:RUNNER_TEMP\webtargets" | Out-Null
            $vsToolsPath = "$env:RUNNER_TEMP\webtargets\MSBuild.Microsoft.VisualStudio.Web.targets.14.0.0.3\tools\VSToolsPath"
          }
          echo "VSToolsPath=$vsToolsPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VisualStudioVersion=17.0" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "VSToolsPath definido como: $vsToolsPath"
      - name: 6) Restaurar pacotes NuGet
        working-directory: backend/Maryar.Api
        shell: pwsh
        run: |
          nuget sources Add -Name "nuget.org" -Source "https://api.nuget.org/v3/index.json" -ErrorAction SilentlyContinue
          nuget restore packages.config -PackagesDirectory ..\packages -SolutionDirectory .. -Verbosity normal
          if ($LASTEXITCODE -ne 0) { throw "NuGet restore falhou" }
          Write-Host "=== Conteudo de ..\packages ==="
          Get-ChildItem ..\packages -Directory | Select-Object Name
      - name: 7) Compilar em Release e publicar em pasta
        working-directory: backend/Maryar.Api
        run: >
          msbuild Maryar.Api.csproj
          /p:Configuration=Release
          /p:Platform=AnyCPU
          /p:VisualStudioVersion=17.0
          /p:VSToolsPath="$env:VSToolsPath"
          /p:DeployOnBuild=true
          /p:WebPublishMethod=FileSystem
          /p:DeployDefaultTarget=WebPublish
          /p:publishUrl=..\publish
          /p:DeleteExistingFiles=true
          /p:PrecompileBeforePublish=false
          /p:ExcludeApp_Data=true
      - name: 8) Compactar a pasta publish em maryar-api-deploy.zip
        run: |
          Compress-Archive -Path backend/publish/* -DestinationPath maryar-api-deploy.zip -Force
        shell: pwsh
      - name: 9) Publicar o ZIP como artifact (download na aba Actions)
        uses: actions/upload-artifact@v4
        with:
          name: maryar-api-deploy
          path: maryar-api-deploy.zip
          retention-days: 30
